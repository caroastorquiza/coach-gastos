function ld(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function fmtK(n){if(Math.abs(n)>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(Math.abs(n)>=1000)return'$'+Math.round(n/1000)+'K';return'$'+Math.round(n).toLocaleString('es-CL')}
function fmtFull(n){return'$'+Math.round(n).toLocaleString('es-CL')}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}

// ── CLAUDE API ────────────────────────────────────────────────
async function callClaude(userMsg, systemPrompt){
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      system: systemPrompt,
      messages:[{role:'user',content:userMsg}]
    })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.content.find(b=>b.type==='text')?.text || '';
}

const SYSTEM_EXTRACT = `Eres un extractor de gastos para una app de finanzas personales chilena.
El usuario te enviará texto copiado de notificaciones de cobros bancarios, pantallazos, o listas de movimientos.
Debes extraer TODOS los cobros o cargos y devolver ÚNICAMENTE un array JSON válido, sin texto adicional, sin backticks.

Categorías disponibles: comida, delivery, transporte, salud, mall, panoramas, fijo, otros

Reglas de categorización:
- UBER EATS, PedidosYa, Rappi, delivery → delivery
- UBER TRIP, taxi, metro, bip, bencina, copec, shell, parking → transporte
- Supermercado (Lider, Jumbo, Tottus, Ekono) → comida
- Restaurantes, cafés, snacks → comida
- Farmacias, médicos, clínicas, ClassPass, gym → salud
- Tiendas de ropa, mall, Falabella, Ripley, H&M, Adidas, Zara → mall
- CAE, comisiones banco, cuotas de deuda → fijo
- Viajes, pasajes, hoteles, actividades especiales → panoramas
- Anything else → otros

Formato de cada objeto:
{"desc":"descripción limpia","monto":número_sin_puntos,"cat":"categoría","fecha":"YYYY-MM-DD"}

Si no hay fecha clara usa hoy. Los montos son en pesos chilenos, sin puntos ni signos.
RESPONDE SOLO EL ARRAY JSON. Ejemplo: [{"desc":"Uber Eats","monto":15000,"cat":"delivery","fecha":"2026-06-03"}]`;

// ── MAIN APP ──────────────────────────────────────────────────
function App(){
  const today=new Date();
  const[tab,setTab]=useState('home');
  const[txs,setTxs]=useState(()=>ld('txs2',[]));
  const[budgets,setBudgets]=useState(()=>ld('budgets2',{...DEF_BUDGETS}));
  const[cuotas,setCuotas]=useState(()=>ld('cuotas2',[...DEF_CUOTAS]));
  const[meta,setMeta]=useState(()=>ld('meta2',800000));
  const[viewMonth,setViewMonth]=useState(today.getMonth());
  const[viewYear,setViewYear]=useState(today.getFullYear());
  // Add gasto modal
  const[addOpen,setAddOpen]=useState(false);
  const[fMonto,setFMonto]=useState('');
  const[fDesc,setFDesc]=useState('');
  const[fFecha,setFFecha]=useState(today.toISOString().slice(0,10));
  const[fCat,setFCat]=useState('comida');
  // Cuota add
  const[cuotaOpen,setCuotaOpen]=useState(false);
  const[cqNombre,setCqNombre]=useState('');
  const[cqMonto,setCqMonto]=useState('');
  const[cqNum,setCqNum]=useState('');
  const[cqTot,setCqTot]=useState('');

  // Persist
  useEffect(()=>sv('txs2',txs),[txs]);
  useEffect(()=>sv('budgets2',budgets),[budgets]);
  useEffect(()=>sv('cuotas2',cuotas),[cuotas]);
  useEffect(()=>sv('meta2',meta),[meta]);

  // Derived
  const monthTxs=txs.filter(t=>{const d=new Date(t.fecha+'T12:00:00');return d.getMonth()===viewMonth&&d.getFullYear()===viewYear});
  const cuotasTotal=cuotas.reduce((s,c)=>s+c.monto,0);
  const rotTotal=monthTxs.reduce((s,t)=>s+t.monto,0);
  const grandTotal=rotTotal+cuotasTotal;
  const pct=Math.min(110,grandTotal/meta*100);
  const resta=meta-grandTotal;
  const isCurrentMonth=viewMonth===today.getMonth()&&viewYear===today.getFullYear();
  const cycleDay=today.getDate();
  const daysPassed=isCurrentMonth?Math.max(1,cycleDay):30;
  const daysLeft=isCurrentMonth?Math.max(0,22-cycleDay):0;
  const spentByCat={};
  monthTxs.forEach(t=>{spentByCat[t.cat]=(spentByCat[t.cat]||0)+t.monto});

  function changeMonth(d){
    setViewMonth(m=>{let nm=m+d,ny=viewYear;if(nm<0){nm=11;ny--}if(nm>11){nm=0;ny++}setViewYear(ny);return nm});
  }

  // ── IMPORT via Claude ──────────────────────────────────────
  function addTxs(newTxs){
    setTxs(prev=>[...prev,...newTxs]);
  }

  // ── RENDER PAGES ──────────────────────────────────────────
  const pages={
    home:<HomePage monthTxs={monthTxs} cuotasTotal={cuotasTotal} rotTotal={rotTotal} grandTotal={grandTotal} pct={pct} resta={resta} meta={meta} daysLeft={daysLeft} viewMonth={viewMonth} viewYear={viewYear} changeMonth={changeMonth} budgets={budgets} spentByCat={spentByCat} isCurrentMonth={isCurrentMonth}/>,
    gastos:<GastosPage monthTxs={monthTxs} deleteTx={deleteTx} viewMonth={viewMonth} viewYear={viewYear}/>,
    import:<ImportPage addTxs={addTxs}/>,
    charts:<ChartsPage monthTxs={monthTxs} rotTotal={rotTotal} cuotasTotal={cuotasTotal} grandTotal={grandTotal} meta={meta} daysPassed={daysPassed} daysLeft={daysLeft} budgets={budgets} spentByCat={spentByCat} cuotas={cuotas} isCurrentMonth={isCurrentMonth}/>,
    settings:<SettingsPage budgets={budgets} setBudgets={setBudgets} meta={meta} setMeta={setMeta} cuotas={cuotas} deleteCuota={deleteCuota} cqNombre={cqNombre} setCqNombre={setCqNombre} cqMonto={cqMonto} setCqMonto={setCqMonto} cqNum={cqNum} setCqNum={setCqNum} cqTot={cqTot} setCqTot={setCqTot} cuotaOpen={cuotaOpen} setCuotaOpen={setCuotaOpen} saveCuota={saveCuota} setTxs={setTxs}/>,
  };
  function saveGasto(){
    const m2=parseFloat(fMonto);
    if(!m2||m2<=0||!fDesc.trim()||!fFecha){alert('Completa todos los campos');return}
    setTxs(prev=>[...prev,{id:uid(),monto:m2,desc:fDesc.trim(),fecha:fFecha,cat:fCat}]);
    setAddOpen(false);setFMonto('');setFDesc('');
  }

  function deleteTx(id){setTxs(prev=>prev.filter(t=>t.id!==id))}
  function deleteCuota(id){setCuotas(prev=>prev.filter(c=>c.id!==id))}

  function saveCuota(){
    if(!cqNombre||!cqMonto){alert('Nombre y monto son obligatorios');return}
    setCuotas(prev=>[...prev,{id:uid(),nombre:cqNombre,monto:parseFloat(cqMonto),num:parseInt(cqNum)||null,tot:parseInt(cqTot)||null}]);
    setCuotaOpen(false);setCqNombre('');setCqMonto('');setCqNum('');setCqTot('');
  }

  return React.createElement(React.Fragment,null,
    React.createElement('div',{style:S.screen},pages[tab]),
    // FAB
    tab!=='import'&&React.createElement('button',{onClick:()=>setAddOpen(true),style:{position:'fixed',bottom:90,right:20,width:54,height:54,borderRadius:'50%',background:'#7c6aff',border:'none',color:'white',fontSize:26,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 20px rgba(124,106,255,0.4)',zIndex:99}},' + '),
    // NAV
    React.createElement('nav',{style:S.nav},
      ['home','gastos','import','charts','settings'].map(p=>
        React.createElement('button',{key:p,style:S.navBtn(tab===p),onClick:()=>setTab(p)},
          React.createElement(NavIcon,{page:p}),
          {home:'Inicio',gastos:'Gastos',import:'Importar',charts:'Análisis',settings:'Ajustes'}[p]
        )
      )
    ),
    // ADD MODAL
    addOpen&&React.createElement('div',{style:S.modalBg,onClick:e=>{if(e.target===e.currentTarget)setAddOpen(false)}},
      React.createElement('div',{style:S.modal},
        React.createElement('div',{style:{width:36,height:4,background:'rgba(255,255,255,0.1)',borderRadius:99,margin:'0 auto 20px'}}),
        React.createElement('h2',{style:{fontSize:18,fontWeight:600,marginBottom:20}},'Nuevo cobro'),
        React.createElement('div',{style:{marginBottom:16}},
          React.createElement('label',{style:{fontSize:12,color:'#6b6b85',marginBottom:6,display:'block',fontWeight:500,textTransform:'uppercase',letterSpacing:'0.05em'}},'Monto ($)'),
          React.createElement('input',{style:S.input,type:'number',placeholder:'0',inputMode:'numeric',value:fMonto,onChange:e=>setFMonto(e.target.value)})
        ),
        React.createElement('div',{style:{marginBottom:16}},
          React.createElement('label',{style:{fontSize:12,color:'#6b6b85',marginBottom:6,display:'block',fontWeight:500,textTransform:'uppercase',letterSpacing:'0.05em'}},'Descripción'),
          React.createElement('input',{style:S.input,type:'text',placeholder:'ej: Uber Eats, Jumbo...',value:fDesc,onChange:e=>setFDesc(e.target.value)})
        ),
        React.createElement('div',{style:{marginBottom:16}},
          React.createElement('label',{style:{fontSize:12,color:'#6b6b85',marginBottom:6,display:'block',fontWeight:500,textTransform:'uppercase',letterSpacing:'0.05em'}},'Fecha'),
          React.createElement('input',{style:S.input,type:'date',value:fFecha,onChange:e=>setFFecha(e.target.value)})
        ),
        React.createElement('div',{style:{marginBottom:16}},
          React.createElement('label',{style:{fontSize:12,color:'#6b6b85',marginBottom:6,display:'block',fontWeight:500,textTransform:'uppercase',letterSpacing:'0.05em'}},'Categoría'),
          React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}},
            CATS.map(c=>React.createElement('div',{key:c.id,onClick:()=>setFCat(c.id),style:{background:fCat===c.id?'rgba(124,106,255,0.15)':'#1c1c26',border:`0.5px solid ${fCat===c.id?'#7c6aff':'rgba(255,255,255,0.07)'}`,borderRadius:10,padding:'10px 6px',textAlign:'center',cursor:'pointer',fontSize:11,color:fCat===c.id?'#7c6aff':'#6b6b85'}},
              React.createElement('span',{style:{fontSize:20,display:'block',marginBottom:4}},c.icon),c.label
            ))
          )
        ),
        React.createElement('button',{style:S.btn('primary'),onClick:saveGasto},'Guardar cobro'),
        React.createElement('button',{style:S.btn('secondary'),onClick:()=>setAddOpen(false)},'Cancelar')
      )
    )
  );
}

// ── HOME PAGE ─────────────────────────────────────────────────

  const sorted=[...monthTxs].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).slice(0,5);

      React.createElement('div',{style:{fontSize:40,fontWeight:300,letterSpacing:-2,margin:'6px 0 2px',fontFamily:'DM Mono,monospace'}},
        React.createElement('span',{style:{fontSize:20,color:'#6b6b85',marginRight:2}},'$'),
        Math.round(grandTotal).toLocaleString('es-CL')
      ),
      React.createElement('div',{style:{fontSize:12,color:'#6b6b85'}},
        'Meta: ',React.createElement('strong',null,fmtFull(meta)),' · ',

      ),
      React.createElement('div',{style:{marginTop:14}},React.createElement(ProgressBar,{pct,h:8})),

        [{val:fmtK(rotTotal),lab:'Rotativo'},{val:fmtK(cuotasTotal),lab:'Cuotas'},{val:fmtK(resta),lab:'Disponible',color:resta<0?'#ef4444':'#5eead4'}].map((s,i)=>
          React.createElement('div',{key:i,style:{flex:1}},

// ── IMPORT PAGE ───────────────────────────────────────────────
function ImportPage({addTxs}){
  const[mode,setMode]=useState('json'); // 'json' | 'text'
  const[jsonText,setJsonText]=useState('');
  const[freeText,setFreeText]=useState('');
  const[parsed,setParsed]=useState(null);
  const[error,setError]=useState('');
  const[success,setSuccess]=useState('');

  // ── JSON IMPORT ──────────────────────────────────────────
  function parseJSON(){
    setError('');setParsed(null);setSuccess('');
    const txt=jsonText.trim();
    if(!txt){setError('Pega el JSON que te dio el coach primero.');return}
    try{
      let arr=JSON.parse(txt);
      if(!Array.isArray(arr))arr=[arr];
      const valid=arr.filter(t=>t.monto>0).map(t=>({
        id:uid(),
        desc:t.desc||t.descripcion||'Sin descripción',
        monto:Number(t.monto)||0,
        cat:t.cat||t.categoria||'otros',
        fecha:t.fecha||new Date().toISOString().slice(0,10)
      }));
      if(!valid.length){setError('No encontré cobros válidos en el JSON.');return}
      setParsed(valid);
    }catch(e){setError('El JSON no es válido. Cópialo completo desde el chat, incluyendo los corchetes [ ].');}
  }

  // ── TEXT PARSE (sin API) ─────────────────────────────────
  // Reglas simples de categorización local
  const CAT_RULES=[
    {pat:/uber\s*eats|pedidosya|rappi|delivery|krispykreme|melt\s*pizza|domino|pizza/i,   cat:'delivery'},
    {pat:/uber\s*trip|taxi|cabify|metro|bip|red\s*movilidad|copec|shell|bencin|combustib|parking|estacion/i, cat:'transporte'},
    {pat:/jumbo|lider|l[ií]der|tottus|ekono|santa\s*isabel|unimarc|carnicer|feria|verdur/i,cat:'comida'},
    {pat:/farmacia|cruz\s*verde|ahumada|salcobrand|m[eé]dico|cl[ií]nica|laboratorio|classpass|gym|fitness/i,cat:'salud'},
    {pat:/falabella|ripley|h&m|zara|adidas|nike|paris|corona|mall|ropa|tienda/i,           cat:'mall'},
    {pat:/cae|comisi[oó]n|banco|cuota|cr[eé]dito|servicio.*actividad/i,                   cat:'fijo'},
    {pat:/latam|hotel|airbnb|booking|pasaje|viaje|fogo|aniversario/i,                     cat:'panoramas'},
    {pat:/restaurant|sushi|nikkei|almuerzo|caf[eé]|spid|apoquindo|mc\s*donald|burger|bar/i,cat:'comida'},
  ];
  function guessCat(desc){
    for(const r of CAT_RULES)if(r.pat.test(desc))return r.cat;
    return'otros';
  }
  function parseText(){
    setError('');setParsed(null);setSuccess('');
    const txt=freeText.trim();
    if(!txt){setError('Escribe o pega el texto del cobro primero.');return}
    const today=new Date().toISOString().slice(0,10);
    const results=[];
    // Try to find amount + description patterns
    // Pattern 1: "Compra de $X.XXX en COMERCIO"
    const p1=/(?:compra|cargo|cobro|pago|transacci[oó]n)[^$\d]*\$?\s*([\d\.]+)\s*(?:en|en\s+)([^\n\r$]+)/gi;
    // Pattern 2: "COMERCIO $X.XXX" or "COMERCIO: $X.XXX"
    const p2=/([A-Z][A-Z\s\*]+?)\s*[\:\-]?\s*\$\s*([\d\.]+)/g;
    // Pattern 3: "$X.XXX en COMERCIO" or "$X.XXX - COMERCIO"
    const p3=/\$\s*([\d\.]+)\s*(?:en|[-–])\s*([^\n\r$,]+)/gi;
    // Pattern 4: simple "monto descripcion" per line
    const lines=txt.split(/[\n\r]+/).filter(l=>l.trim());

    let found=false;
    for(const line of lines){
      const l=line.trim();
      // Try p1
      let m;
      const rp1=new RegExp(p1.source,'gi');
      while((m=rp1.exec(l))!==null){
        const monto=parseFloat(m[1].replace(/\./g,''));
        const desc=m[2].trim().replace(/\s+/g,' ').slice(0,60);
        if(monto>0&&desc){results.push({id:uid(),monto,desc,cat:guessCat(desc),fecha:today});found=true}
      }
      if(found)continue;
      // Try p3
      const rp3=new RegExp(p3.source,'gi');
      while((m=rp3.exec(l))!==null){
        const monto=parseFloat(m[1].replace(/\./g,''));
        const desc=m[2].trim().replace(/\s+/g,' ').slice(0,60);
        if(monto>0&&desc){results.push({id:uid(),monto,desc,cat:guessCat(desc),fecha:today});found=true}
      }
      if(found)continue;
      // Try p2
      const rp2=new RegExp(p2.source,'g');
      while((m=rp2.exec(l))!==null){
        const monto=parseFloat(m[2].replace(/\./g,''));
        const desc=m[1].trim().replace(/\s+/g,' ').slice(0,60);
        if(monto>100&&desc.length>2){results.push({id:uid(),monto,desc,cat:guessCat(desc),fecha:today});found=true}
      }
    }
    if(!results.length){
      // Last resort: find any number that looks like a Chilean peso amount
      const anyAmt=/\$?\s*([\d]{1,3}(?:\.[\d]{3})+|[\d]{4,7})/g;
      let m2;
      while((m2=anyAmt.exec(txt))!==null){
        const monto=parseFloat(m2[1].replace(/\./g,''));
        if(monto>=1000&&monto<=10000000){
          // grab surrounding text as description
          const start=Math.max(0,m2.index-40);
          const end=Math.min(txt.length,m2.index+m2[0].length+40);
          const desc=txt.slice(start,end).replace(/[\n\r]/g,' ').trim().slice(0,60);
          results.push({id:uid(),monto,desc,cat:guessCat(desc),fecha:today});
        }
      }
    }
    if(!results.length){setError('No pude detectar cobros automáticamente. Prueba con el modo JSON o agrega el cobro manualmente con el botón +.');return}
    // Deduplicate by monto+desc
    const seen=new Set();
    const unique=results.filter(r=>{const k=r.monto+'|'+r.desc;if(seen.has(k))return false;seen.add(k);return true});
    setParsed(unique);
  }

  function confirm(){
    if(!parsed?.length)return;
    addTxs(parsed);
    setParsed(null);setJsonText('');setFreeText('');
    setSuccess('✅ '+parsed.length+' cobro(s) agregados correctamente.');
    setTimeout(()=>setSuccess(''),3000);
  }

  function reset(){setParsed(null);setError('');setJsonText('');setFreeText('');}

  const tabStyle=(active)=>({flex:1,padding:'10px 6px',background:active?'rgba(124,106,255,0.15)':'transparent',border:'none',borderBottom:`2px solid ${active?'#7c6aff':'transparent'}`,color:active?'#7c6aff':'#6b6b85',fontSize:13,fontWeight:active?600:400,fontFamily:'DM Sans,system-ui,sans-serif',cursor:'pointer',transition:'all 0.15s'});

  return React.createElement('div',null,
    React.createElement('div',{style:{padding:'52px 20px 16px',background:'linear-gradient(180deg,rgba(94,234,212,0.06) 0%,transparent 100%)'}},
      React.createElement('h1',{style:{fontSize:26,fontWeight:600,letterSpacing:-0.5}},'Importar cobros'),
      React.createElement('p',{style:{fontSize:13,color:'#6b6b85',marginTop:4}},'Dos formas de agregar gastos rápido')
    ),

    // Tabs
    React.createElement('div',{style:{display:'flex',margin:'0 16px 12px',background:'#13131a',borderRadius:12,border:'0.5px solid rgba(255,255,255,0.07)',overflow:'hidden'}},
      React.createElement('button',{style:tabStyle(mode==='text'),onClick:()=>{setMode('text');reset()}},'📱 Texto / Notificación'),
      React.createElement('button',{style:tabStyle(mode==='json'),onClick:()=>{setMode('json');reset()}},'📋 JSON del coach')
    ),

    // Success
    success&&React.createElement('div',{style:{margin:'0 16px 12px',padding:'12px 14px',borderRadius:10,background:'rgba(34,197,94,0.1)',border:'0.5px solid rgba(34,197,94,0.3)',fontSize:13,color:'#4ade80',fontWeight:500}},success),

    // ── MODE: TEXT ──────────────────────────────────────────
    mode==='text'&&React.createElement('div',null,
      React.createElement('div',{style:{...S.card,background:'rgba(94,234,212,0.04)',border:'0.5px solid rgba(94,234,212,0.15)'}},
        React.createElement('div',{style:{fontSize:12,color:'#5eead4',fontWeight:500,marginBottom:6}},'💡 Cómo usar'),
        React.createElement('div',{style:{fontSize:12,color:'#6b6b85',lineHeight:1.8}},
          '1. Copia el texto de la notificación del banco\n',
          '2. Pégalo aquí abajo\n',
          '3. Toca "Detectar cobros"\n',
          '4. Revisa y confirma — si algo falla, corrígelo manualmente con +'
        )
      ),
      React.createElement('div',{style:{margin:'0 16px 12px'}},
        React.createElement('label',{style:{fontSize:12,color:'#6b6b85',marginBottom:6,display:'block',fontWeight:500,textTransform:'uppercase',letterSpacing:'0.05em'}},'Texto del cobro'),
        React.createElement('textarea',{
          style:{...S.input,minHeight:130,resize:'none',lineHeight:1.6,fontSize:14},
          placeholder:'Ejemplos que funcionan:\n\n"Compra aprobada $5.690 en OXXO"\n"Cargo en cuenta: $15.990 - UBER EATS"\n"Shell $32.000 · Jumbo $45.200"',
          value:freeText,
          onChange:e=>{setFreeText(e.target.value);setError('');setParsed(null)}
        })
      ),
      error&&React.createElement('div',{style:{margin:'0 16px 12px',padding:'10px 14px',borderRadius:10,background:'rgba(239,68,68,0.1)',border:'0.5px solid rgba(239,68,68,0.3)',fontSize:12,color:'#f87171'}},error),
      !parsed&&React.createElement('div',{style:{margin:'0 16px'}},
        React.createElement('button',{style:S.btn('primary'),onClick:parseText},'🔍 Detectar cobros')
      )
    ),

    // ── MODE: JSON ──────────────────────────────────────────
    mode==='json'&&React.createElement('div',null,
      React.createElement('div',{style:{...S.card,background:'rgba(124,106,255,0.04)',border:'0.5px solid rgba(124,106,255,0.15)'}},
        React.createElement('div',{style:{fontSize:12,color:'#a78bfa',fontWeight:500,marginBottom:6}},'💡 Cómo usar'),
        React.createElement('div',{style:{fontSize:12,color:'#6b6b85',lineHeight:1.8}},
          '1. Manda tus cobros al coach en este chat\n',

        )
      ),
      React.createElement('div',{style:{margin:'0 16px 12px'}},
        React.createElement('label',{style:{fontSize:12,color:'#6b6b85',marginBottom:6,display:'block',fontWeight:500,textTransform:'uppercase',letterSpacing:'0.05em'}},'JSON del coach'),
        React.createElement('textarea',{
          style:{...S.input,minHeight:130,resize:'none',lineHeight:1.6,fontSize:13,fontFamily:'DM Mono,monospace'},
          placeholder:'[{"desc":"...","monto":0,"cat":"...","fecha":"2026-06-05"}]',
          value:jsonText,
          onChange:e=>{setJsonText(e.target.value);setError('');setParsed(null)}
        })
      ),
      error&&React.createElement('div',{style:{margin:'0 16px 12px',padding:'10px 14px',borderRadius:10,background:'rgba(239,68,68,0.1)',border:'0.5px solid rgba(239,68,68,0.3)',fontSize:12,color:'#f87171'}},error),
      !parsed&&React.createElement('div',{style:{margin:'0 16px'}},

      )
    ),

    // ── PREVIEW ─────────────────────────────────────────────
    parsed&&React.createElement('div',null,

    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,margin:'0 16px 12px'}},
      [{val:fmtK(avgDay),lab:'Gasto diario promedio'},{val:fmtK(proj),lab:'Proyección al cierre',color:proj>meta?'#ef4444':'#22c55e'},{val:fmtK(grandTotal),lab:'Total acumulado'},{val:monthTxs.length,lab:'Movimientos'}].map((s,i)=>
        React.createElement('div',{key:i,style:{background:'#13131a',border:'0.5px solid rgba(255,255,255,0.07)',borderRadius:14,padding:14}},
          React.createElement('div',{style:{fontSize:20,fontWeight:600,fontFamily:'DM Mono,monospace',marginBottom:2,color:s.color||'#f0f0f8'}},s.val),
          React.createElement('div',{style:{fontSize:11,color:'#6b6b85'}},s.lab)
        )
      )
    ),
    React.createElement('div',{style:{fontSize:11,color:'#6b6b85',textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:500,padding:'16px 20px 8px'}},'Gasto vs presupuesto'),
    React.createElement('div',{style:S.card},React.createElement('div',{style:{position:'relative',height:220}},React.createElement('canvas',{ref:barRef,role:'img','aria-label':'Gráfico de barras gasto vs presupuesto por categoría'}))),
    React.createElement('div',{style:{fontSize:11,color:'#6b6b85',textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:500,padding:'16px 20px 8px'}},'Distribución del mes'),
    React.createElement('div',{style:{...S.card,display:'flex',alignItems:'center',gap:16}},
      React.createElement('canvas',{ref:donutRef,width:120,height:120,style:{flexShrink:0},role:'img','aria-label':'Gráfico donut de distribución de gastos'}),
      React.createElement('div',{style:{flex:1}},
        CATS.filter(c=>(spentByCat[c.id]||0)>0).map(c=>{
          const pct=total2>0?Math.round((spentByCat[c.id]||0)/total2*100):0;
          return React.createElement('div',{key:c.id,style:{display:'flex',alignItems:'center',gap:6,marginBottom:7}},
            React.createElement('span',{style:{width:8,height:8,borderRadius:'50%',background:c.color,flexShrink:0}}),
            React.createElement('span',{style:{fontSize:12,color:'#6b6b85',flex:1}},c.label),
            React.createElement('span',{style:{fontSize:12,fontWeight:500}},pct+'%')
          )
        })
      )
    ),
    React.createElement('div',{style:{fontSize:11,color:'#6b6b85',textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:500,padding:'16px 20px 8px'}},'Cuotas fijas del período'),
    React.createElement('div',{style:S.card},
      cuotas.length===0
        ?React.createElement('p',{style:{fontSize:13,color:'#6b6b85'}},'Sin cuotas configuradas.')
        :React.createElement('div',null,
          cuotas.map(c=>React.createElement('div',{key:c.id,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'0.5px solid rgba(255,255,255,0.07)'}},
            React.createElement('div',null,
              React.createElement('div',{style:{fontSize:13,fontWeight:500}},'🔒 '+c.nombre),
              c.num&&React.createElement('div',{style:{fontSize:11,color:'#6b6b85',marginTop:2}},'Cuota '+c.num+(c.tot?'/'+c.tot:''))
            ),
            React.createElement('span',{style:{fontSize:14,fontWeight:600,fontFamily:'DM Mono,monospace',color:'#5eead4'}},fmtFull(c.monto))
          )),
          React.createElement('div',{style:{display:'flex',justifyContent:'space-between',padding:'12px 0 0',fontWeight:600,fontSize:14}},
            React.createElement('span',null,'Total cuotas'),
            React.createElement('span',{style:{fontFamily:'DM Mono,monospace',color:'#5eead4'}},fmtFull(cuotas.reduce((s,c)=>s+c.monto,0)))
          )
        )
    )
  );
}

// ── SETTINGS PAGE ─────────────────────────────────────────────
function SettingsPage({budgets,setBudgets,meta,setMeta,cuotas,deleteCuota,cqNombre,setCqNombre,cqMonto,setCqMonto,cqNum,setCqNum,cqTot,setCqTot,cuotaOpen,setCuotaOpen,saveCuota,setTxs}){
  const[editCat,setEditCat]=useState(null);
  const[editVal,setEditVal]=useState('');
  const[newMeta,setNewMeta]=useState('');
  const[editMetaOpen,setEditMetaOpen]=useState(false);

  return React.createElement('div',null,
    React.createElement('div',{style:{padding:'52px 20px 16px'}},
      React.createElement('h1',{style:{fontSize:26,fontWeight:600,letterSpacing:-0.5}},'Configuración'),
      React.createElement('p',{style:{fontSize:13,color:'#6b6b85',marginTop:4}},'Presupuestos y cuotas')
    ),
    // Meta
    React.createElement('div',{style:{fontSize:11,color:'#6b6b85',textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:500,padding:'0 20px 8px'}},'Meta mensual'),
    React.createElement('div',{style:S.card},
      React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
        React.createElement('div',null,
          React.createElement('div',{style:{fontSize:14,fontWeight:500}},'Facturación máxima'),
          React.createElement('div',{style:{fontSize:12,color:'#6b6b85',marginTop:2}},'Límite total del mes')
        ),
        React.createElement('div',{style:{fontSize:14,color:'#7c6aff',fontWeight:500,fontFamily:'DM Mono,monospace',cursor:'pointer'},onClick:()=>{setNewMeta(meta);setEditMetaOpen(true)}},fmtFull(meta))
      )
    ),
    // Budgets
    React.createElement('div',{style:{fontSize:11,color:'#6b6b85',textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:500,padding:'16px 20px 8px'}},'Presupuesto por categoría'),
    React.createElement('div',{style:S.card},
      CATS.map(cat=>React.createElement('div',{key:cat.id,style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 0',borderBottom:'0.5px solid rgba(255,255,255,0.07)',cursor:'pointer'},onClick:()=>{setEditCat(cat);setEditVal(budgets[cat.id]||0)}},
        React.createElement('div',null,
          React.createElement('div',{style:{fontSize:14,fontWeight:500}},cat.icon+' '+cat.label),
          React.createElement('div',{style:{fontSize:12,color:'#6b6b85',marginTop:2}},'Toca para editar')
        ),
        React.createElement('div',{style:{fontSize:14,color:'#7c6aff',fontWeight:500,fontFamily:'DM Mono,monospace'}},fmtFull(budgets[cat.id]||0))
      ))
    ),
    // Cuotas
    React.createElement('div',{style:{fontSize:11,color:'#6b6b85',textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:500,padding:'16px 20px 8px'}},'Cuotas fijas del período'),
    React.createElement('div',{style:S.card},
      cuotas.map(c=>React.createElement('div',{key:c.id,style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0',borderBottom:'0.5px solid rgba(255,255,255,0.07)'}},
        React.createElement('div',null,
          React.createElement('div',{style:{fontSize:14,fontWeight:500}},c.nombre),
          c.num&&React.createElement('div',{style:{fontSize:12,color:'#6b6b85',marginTop:2}},'Cuota '+c.num+(c.tot?'/'+c.tot:''))
        ),
        React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10}},
          React.createElement('span',{style:{fontSize:14,color:'#5eead4',fontWeight:500,fontFamily:'DM Mono,monospace'}},fmtFull(c.monto)),
          React.createElement('button',{onClick:()=>deleteCuota(c.id),style:{background:'none',border:'none',color:'#6b6b85',fontSize:18,cursor:'pointer',padding:'4px 6px'}},'×')
        )
      )),
      React.createElement('button',{style:{...S.btn('secondary'),marginTop:12},onClick:()=>setCuotaOpen(true)},'+ Agregar cuota')
    ),
    // Data
    React.createElement('div',{style:{fontSize:11,color:'#6b6b85',textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:500,padding:'16px 20px 8px'}},'Datos'),
    React.createElement('div',{style:S.card},
      React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0'}},
        React.createElement('div',null,
          React.createElement('div',{style:{fontSize:14,fontWeight:500}},'Limpiar movimientos del mes'),
          React.createElement('div',{style:{fontSize:12,color:'#6b6b85',marginTop:2}},'Borra solo el mes actual')
        ),
        React.createElement('button',{onClick:()=>{if(confirm('¿Borrar movimientos del mes actual?'))setTxs(prev=>{const now=new Date();return prev.filter(t=>{const d=new Date(t.fecha+'T12:00:00');return!(d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear())})})},style:{background:'rgba(239,68,68,0.1)',border:'0.5px solid rgba(239,68,68,0.3)',borderRadius:8,padding:'6px 12px',color:'#f87171',fontSize:13,cursor:'pointer'}},'Limpiar')
      )
    ),
    React.createElement('div',{style:{height:20}}),

    // Modal editar presupuesto
    editCat&&React.createElement('div',{style:S.modalBg,onClick:e=>{if(e.target===e.currentTarget)setEditCat(null)}},
      React.createElement('div',{style:S.modal},
        React.createElement('div',{style:{width:36,height:4,background:'rgba(255,255,255,0.1)',borderRadius:99,margin:'0 auto 20px'}}),
        React.createElement('h2',{style:{fontSize:18,fontWeight:600,marginBottom:20}},'Presupuesto: '+editCat.label),
        React.createElement('input',{style:S.input,type:'number',inputMode:'numeric',value:editVal,onChange:e=>setEditVal(e.target.value)}),
        React.createElement('button',{style:S.btn('primary'),onClick:()=>{setBudgets(prev=>({...prev,[editCat.id]:parseFloat(editVal)||0}));setEditCat(null)}},'Guardar'),
        React.createElement('button',{style:S.btn('secondary'),onClick:()=>setEditCat(null)},'Cancelar')
      )
    ),
    // Modal editar meta
    editMetaOpen&&React.createElement('div',{style:S.modalBg,onClick:e=>{if(e.target===e.currentTarget)setEditMetaOpen(false)}},
      React.createElement('div',{style:S.modal},
        React.createElement('div',{style:{width:36,height:4,background:'rgba(255,255,255,0.1)',borderRadius:99,margin:'0 auto 20px'}}),
        React.createElement('h2',{style:{fontSize:18,fontWeight:600,marginBottom:20}},'Meta mensual'),
        React.createElement('input',{style:S.input,type:'number',inputMode:'numeric',value:newMeta,onChange:e=>setNewMeta(e.target.value)}),
        React.createElement('button',{style:S.btn('primary'),onClick:()=>{setMeta(parseFloat(newMeta)||800000);setEditMetaOpen(false)}},'Guardar'),
        React.createElement('button',{style:S.btn('secondary'),onClick:()=>setEditMetaOpen(false)},'Cancelar')
      )
    ),
    // Modal agregar cuota
    cuotaOpen&&React.createElement('div',{style:S.modalBg,onClick:e=>{if(e.target===e.currentTarget)setCuotaOpen(false)}},
      React.createElement('div',{style:S.modal},
        React.createElement('div',{style:{width:36,height:4,background:'rgba(255,255,255,0.1)',borderRadius:99,margin:'0 auto 20px'}}),
        React.createElement('h2',{style:{fontSize:18,fontWeight:600,marginBottom:20}},'Agregar cuota fija'),
        React.createElement('div',{style:{marginBottom:16}},
          React.createElement('label',{style:{fontSize:12,color:'#6b6b85',marginBottom:6,display:'block',fontWeight:500}},'Nombre'),
          React.createElement('input',{style:S.input,type:'text',placeholder:'ej: Scotiabank CAE',value:cqNombre,onChange:e=>setCqNombre(e.target.value)})
        ),
        React.createElement('div',{style:{marginBottom:16}},
          React.createElement('label',{style:{fontSize:12,color:'#6b6b85',marginBottom:6,display:'block',fontWeight:500}},'Monto ($)'),
          React.createElement('input',{style:S.input,type:'number',inputMode:'numeric',placeholder:'0',value:cqMonto,onChange:e=>setCqMonto(e.target.value)})
        ),
        React.createElement('div',{style:{marginBottom:16}},
          React.createElement('label',{style:{fontSize:12,color:'#6b6b85',marginBottom:6,display:'block',fontWeight:500}},'Cuota N° / Total (opcional)'),
          React.createElement('div',{style:{display:'flex',gap:8}},
            React.createElement('input',{style:{...S.input,flex:1},type:'number',inputMode:'numeric',placeholder:'ej: 2',value:cqNum,onChange:e=>setCqNum(e.target.value)}),
            React.createElement('input',{style:{...S.input,flex:1},type:'number',inputMode:'numeric',placeholder:'ej: 3',value:cqTot,onChange:e=>setCqTot(e.target.value)})
          )
        ),
        React.createElement('button',{style:S.btn('primary'),onClick:saveCuota},'Agregar cuota'),
        React.createElement('button',{style:S.btn('secondary'),onClick:()=>setCuotaOpen(false)},'Cancelar')
      )
    )
  );
}

createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
